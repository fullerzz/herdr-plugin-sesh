# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
body = """
{% if version %}\
## v{{ version | trim_start_matches(pat="v") }} ({{ timestamp | date(format="%Y-%m-%d") }})
{% else %}\
## Unreleased
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{% if commit.breaking %}[BREAKING] {% endif %}{{ commit.message | split(pat="\n") | first | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](<REPO>/commit/{{ commit.id }}))
{% endfor %}

{% endfor %}
"""
trim = true
render_always = true
postprocessors = [
    { pattern = "(^|[^\\x5b])#([0-9]+)", replace = '${1}[#${2}](https://github.com/fullerzz/herdr-plugin-sesh/issues/${2})' },
    { pattern = "<REPO>", replace = "https://github.com/fullerzz/herdr-plugin-sesh" },
]

[git]
tag_pattern = "v[0-9].*"
conventional_commits = true
filter_unconventional = false
require_conventional = false
split_commits = false
commit_preprocessors = [
    { pattern = '\\((\\w+\\s)?#([0-9]+)\\)', replace = "([#${2}](<REPO>/issues/${2}))" },
]
protect_breaking_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->🚀 Features" },
    { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^docs\\(CHANGELOG\\)", skip = true },
    { message = "^doc", group = "<!-- 3 -->📚 Documentation" },
    { message = "^perf", group = "<!-- 4 -->⚡ Performance" },
    { message = "^refactor", group = "<!-- 2 -->🚜 Refactor" },
    { message = "^style", group = "<!-- 5 -->🎨 Styling" },
    { message = "^test", group = "<!-- 6 -->🧪 Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore(?:\\(release\\))?: release", skip = true },
    { message = "^chore\\(pr\\)", skip = true },
    { message = "^chore\\(pull\\)", skip = true },
    { message = "^chore\\(deps\\)", group = "<!-- 11 -->🛬 Dependency Updates" },
    { message = "^chore", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
    { message = "^ci", group = "<!-- 8 -->🎡 Continuous Integration" },
    { body = ".*security", group = "<!-- 9 -->🛡️ Security" },
    { message = "^revert", group = "<!-- 10 -->◀️ Revert" },
    { message = ".*", group = "<!-- 12 -->💼 Other" },
]
filter_commits = false
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/fullerzz/herdr-plugin-sesh/issues/$1" },
]
use_branch_tags = false
topo_order = false
topo_order_commits = true
sort_commits = "oldest"
recurse_submodules = false
