name: Lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Formatting and linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: true
          install: true

      - name: Check formatting
        run: just fmt-check

      - name: Run linters
        run: just lint
