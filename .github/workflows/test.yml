name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          cache: true
          install: true

      - name: Download modules
        run: go mod download

      - name: Repo checks
        run: just check

      - name: Build
        run: just build

      - name: CLI smoke test
        run: |
          ./bin/herdr-sesh --version
          ./bin/herdr-sesh list --json \
            --config testdata/sesh.toml \
            >/tmp/herdr-sesh-list.json
          test -s /tmp/herdr-sesh-list.json
