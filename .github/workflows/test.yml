name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up mise
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4
        with:
          cache: true
          install: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: just test

      - name: Test release ref resolution
        run: just test-release-ref

      - name: Build
        run: just build

      - name: CLI smoke test
        run: |
          ./bin/herdr-sesh --version
          ./bin/herdr-sesh list --json \
            --config testdata/sesh.toml \
            >/tmp/herdr-sesh-list.json
          test -s /tmp/herdr-sesh-list.json
