name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Go test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          cache: true
          install: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: just test

      - name: Test release ref resolution
        run: just test-release-ref

      - name: Build
        run: just build

      - name: CLI smoke test
        run: |
          ./bin/herdr-sesh --version
          ./bin/herdr-sesh list --json \
            --config testdata/sesh.toml \
            >/tmp/herdr-sesh-list.json
          test -s /tmp/herdr-sesh-list.json
