name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to release, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release-ref.outputs.tag }}
      commit: ${{ steps.verify-ref.outputs.commit }}
    steps:
      - name: Resolve release ref
        id: release-ref
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
            if [ -z "$tag" ]; then
              echo 'Release tag is required' >&2
              exit 1
            fi
            ref="refs/tags/$tag"
          else
            ref="$EVENT_REF"
            case "$ref" in
              refs/tags/*) tag=${ref#refs/tags/} ;;
              *) echo "Release ref must be a tag, got: $ref" >&2; exit 1 ;;
            esac
          fi
          case "$tag" in
            v*) ;;
            *) echo "Release tag must start with v, got: $tag" >&2; exit 1 ;;
          esac
          if [[ ! "$tag" =~ ^v[0-9A-Za-z][0-9A-Za-z._+-]*$ ]]; then
            echo "Release tag must match project-safe syntax: $tag" >&2
            exit 1
          fi
          if ! git check-ref-format "$ref" >/dev/null; then
            echo "Invalid release tag ref: $ref" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify and check out requested tag commit
        id: verify-ref
        shell: bash
        env:
          RELEASE_REF: ${{ steps.release-ref.outputs.ref }}
        run: |
          set -euo pipefail
          commit=$(bash .github/scripts/checkout-release-ref.sh "$RELEASE_REF")
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify
        run: |
          go mod download
          test -z "$(gofmt -l .)"
          go vet ./...
          go test ./...
          go build -o bin/herdr-sesh ./cmd/herdr-sesh
          ./bin/herdr-sesh --version

  release:
    name: Build release assets
    needs: test
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      pull-requests: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      commit: ${{ needs.test.outputs.commit }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.test.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify immutable release commit
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ needs.test.outputs.commit }}
        run: |
          set -euo pipefail
          head=$(git rev-parse HEAD)
          if [ "$head" != "$EXPECTED_COMMIT" ]; then
            echo "Checked-out HEAD $head does not match verified release commit $EXPECTED_COMMIT" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: meta
        shell: bash
        env:
          TAG: ${{ needs.test.outputs.tag }}
        run: |
          set -euo pipefail
          tag="$TAG"
          version="${tag#v}"
          manifest_version=$(awk -F'"' '
            /^version = / { print $2; exit }
          ' herdr-plugin.toml)
          if [ "$manifest_version" != "$version" ]; then
            echo "Tag mismatch: $tag != manifest $manifest_version" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release assets
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          version="$VERSION"
          module='github.com/fullerzz/herdr-plugin-sesh/internal/app'
          mkdir -p dist/release dist/work
          targets=(
            linux/amd64
            linux/arm64
            darwin/amd64
            darwin/arm64
          )
          for target in "${targets[@]}"; do
            goos=${target%/*}
            goarch=${target#*/}
            name="herdr-sesh_${version}_${goos}_${goarch}"
            out="dist/work/${name}/bin/herdr-sesh"
            mkdir -p "$(dirname "$out")"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build \
                -trimpath \
                -ldflags "-s -w -X ${module}.Version=${version}" \
                -o "$out" \
                ./cmd/herdr-sesh
            cp README.md LICENSE herdr-plugin.toml "dist/work/${name}/"
            tar -C dist/work -czf "dist/release/${name}.tar.gz" "$name"
          done
          smoke_dir=$(mktemp -d)
          smoke_name="herdr-sesh_${version}_linux_amd64"
          tar -xzf "dist/release/${smoke_name}.tar.gz" -C "$smoke_dir"
          binary="$smoke_dir/${smoke_name}/bin/herdr-sesh"
          manifest="$smoke_dir/${smoke_name}/herdr-plugin.toml"
          test -x "$binary"
          grep -Fq './bin/herdr-sesh' "$manifest"
          packaged_version=$(awk -F'"' '
            /^version = / { print $2; exit }
          ' "$manifest")
          test "$packaged_version" = "$version"
          test "$("$binary" --version)" = "herdr-sesh ${version}"
          "$binary" list --json \
            --config testdata/sesh.toml \
            >/tmp/herdr-sesh-release-list.json
          test -s /tmp/herdr-sesh-release-list.json
          (cd dist/release && sha256sum -- *.tar.gz > checksums.txt)

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-checksums: dist/release/checksums.txt

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          version: v2.13.1
          config: cliff.toml
          args: --current --strip header --verbose
        env:
          OUTPUT: dist/release/CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Verify changelog
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: grep -Fq "## ${TAG} " dist/release/CHANGELOG.md

      - name: Generate release notes
        shell: bash
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          COMMIT: ${{ needs.test.outputs.commit }}
        run: |
          set -euo pipefail
          tag="$TAG"
          version="$VERSION"
          {
            echo "# herdr-plugin-sesh ${tag}"
            echo
            echo "Sesh-style smart workspace/session management for Herdr."
            echo
            cat dist/release/CHANGELOG.md
            echo
            echo "## Install from GitHub"
            echo
            echo '```bash'
            echo "git clone https://github.com/fullerzz/herdr-plugin-sesh.git"
            echo "cd herdr-plugin-sesh"
            echo "git checkout ${tag}"
            echo 'go build -o bin/herdr-sesh ./cmd/herdr-sesh'
            # shellcheck disable=SC2016 # Keep $PWD literal in the generated instructions.
            echo 'herdr plugin link "$PWD"'
            echo '```'
            echo
            echo "## Assets"
            echo
            for file in dist/release/*.tar.gz; do
              echo "- $(basename "$file")"
            done
            echo "- CHANGELOG.md"
            echo "- checksums.txt"
            echo
            echo "Version: ${version}"
            echo "Commit: ${COMMIT}"
          } > dist/release/RELEASE_NOTES.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: herdr-plugin-sesh-${{ steps.meta.outputs.tag }}
          path: dist/release/*

  publish:
    name: Publish GitHub release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release.outputs.tag }}
          EXPECTED_COMMIT: ${{ needs.release.outputs.commit }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          gh run download "$GITHUB_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "herdr-plugin-sesh-${TAG}" \
            --dir dist/release

          if ! object=$(gh api \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" \
            --jq '[.object.type, .object.sha] | @tsv'); then
            echo "Requested release tag is no longer available: refs/tags/$TAG" >&2
            exit 1
          fi
          IFS=$'\t' read -r object_type remote_commit <<< "$object"
          while [ "$object_type" = tag ]; do
            if ! object=$(gh api \
              "repos/${GITHUB_REPOSITORY}/git/tags/${remote_commit}" \
              --jq '[.object.type, .object.sha] | @tsv'); then
              echo "Could not peel requested release tag refs/tags/$TAG" >&2
              exit 1
            fi
            IFS=$'\t' read -r object_type remote_commit <<< "$object"
          done
          if [ "$object_type" != commit ]; then
            echo "Requested release tag does not peel to a commit: refs/tags/$TAG" >&2
            exit 1
          fi
          if [ "$remote_commit" != "$EXPECTED_COMMIT" ]; then
            echo "Requested release tag moved from $EXPECTED_COMMIT to $remote_commit" >&2
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file dist/release/RELEASE_NOTES.md
          else
            gh release create "$TAG" dist/release/* \
              --verify-tag \
              --title "$TAG" \
              --notes-file dist/release/RELEASE_NOTES.md
          fi
